name: Deploy showcase to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  deployments: write # for the GitHub Deployments API status line

jobs:
  deploy:
    name: Build + deploy mittsu.dev
    runs-on: ubuntu-latest
    concurrency:
      # Only one deploy at a time per branch; queued runs replace the previous.
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check --workspaces --if-present

      - name: Build apps/web
        working-directory: apps/web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          # First deploy auto-creates the Pages project named "mittsu".
          # Subsequent deploys push to the existing project.
          command: pages deploy build --project-name=mittsu --branch=${{ github.ref_name }}
